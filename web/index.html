<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JARVIS SYSTEM | CORE 0.2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;500;600;700&family=Space+Mono&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/styles/global.css" />
    <link rel="stylesheet" href="/src/styles/layout.css" />
    <link rel="stylesheet" href="/src/components/Status/Status.css" />
    <link rel="stylesheet" href="/src/components/Orb/Orb.css" />
    <link rel="stylesheet" href="/src/components/Terminal/Terminal.css" />
    <link rel="stylesheet" href="/src/components/Chat/Chat.css" />
    <link rel="stylesheet" href="/src/components/Settings/Settings.css" />
    <link rel="stylesheet" href="/src/components/WebSearch/WebSearch.css" />
  </head>
  <body>
    <div id="app" class="app-layout">
      <div id="status-mount"></div>

      <aside class="stage-left">
        <div id="analytics-mount" class="glass">
          <div class="card-header">CORE TELEMETRY</div>
          <div class="card-body">
            <div class="metric">CPU <span class="v">08.2%</span></div>
            <div class="metric">MEM <span class="v">1.4 GB</span></div>
            <div class="metric">LAT <span class="v">12 ms</span></div>
          </div>
        </div>
      </aside>

      <main id="orb-mount" class="orb-mount"></main>

      <aside class="stage-right">
        <div id="terminal-mount"></div>
        <div id="chat-mount" class="glass"></div>
      </aside>

      <div id="settings-mount"></div>
      <div id="websearch-mount"></div>

      <button
        id="open-settings"
        class="settings-trigger"
        title="System Settings"
      >
        ⚙
      </button>
    </div>

    <script type="module" src="/src/app.js"></script>
  </body>
</html>
